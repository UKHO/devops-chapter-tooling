name: Linting Poc

on:
    push:
        branches: [lint-poc]
    pull_request:
        branches: [lint-poc]

jobs:
    megalinter:
        name: linting checks
        runs-on: ubuntu-latest
        permissions:
          contents: write
          issues: write
          pull-requests: write
        steps:
            - name: Checkout Code
              uses: actions/checkout@v5

            - name: Run Mega-Linter
              id: ml
              # uses: UKHO/megalinter-custom-flavor-ukho@v0.0.1-alpha
              uses: oxsecurity/megalinter/flavors/terraform@v9.1.0
              env:
                VALIDATE_ALL_CODEBASE: true
                APPLY_FIXES: all
                APPLY_FIXES_EVENT: all
                APPLY_FIXES_MODE: pull_request
                APPLY_FIXES_IF_COMMIT: 'true'
                ENABLE: MARKDOWN,YAML,TERRAFORM
                DISABLE_LINTERS: MARKDOWN_MARKDOWN_TABLE_FORMATTER,YAML_PRETTIER,YAML_V8R,TERRAFORM_TERRAFORM_FMT,TERRAFORM_TERRASCAN
            # Upload MegaLinter artifacts
            - name: Archive production artifacts
              if: success() || failure()
              uses: actions/upload-artifact@v4
              with:
                name: MegaLinter reports
                include-hidden-files: "true"
                path: |
                  megalinter-reports
                  mega-linter.log
             # Set APPLY_FIXES_IF var for use in future steps
            - name: Set APPLY_FIXES_IF var
              run: |
                printf 'APPLY_FIXES_IF=%s\n' "${{
                  steps.ml.outputs.has_updated_sources == 1 &&
                  (
                    env.APPLY_FIXES_EVENT == 'all' ||
                    env.APPLY_FIXES_EVENT == github.event_name
                  ) &&
                  (
                    github.event_name == 'push' ||
                    github.event.pull_request.head.repo.full_name == github.repository
                  )
                }}" >> "${GITHUB_ENV}"
               # Set APPLY_FIXES_IF_* vars for use in future steps
            - name: Set APPLY_FIXES_IF_* vars
              run: |
                printf 'APPLY_FIXES_IF_PR=%s\n' "${{
                  env.APPLY_FIXES_IF == 'true' &&
                  env.APPLY_FIXES_MODE == 'pull_request'
                }}" >> "${GITHUB_ENV}"
                printf 'APPLY_FIXES_IF_COMMIT=%s\n' "${{
                  env.APPLY_FIXES_IF == 'true' &&
                  env.APPLY_FIXES_MODE == 'commit' &&
                  (!contains(fromJSON('["refs/heads/main", "refs/heads/master"]'), github.ref))
                }}" >> "${GITHUB_ENV}"

            # Create pull request if applicable
            # (for now works only on PR from same repository, not from forks)
            - name: Create Pull Request with applied fixes
              uses: peter-evans/create-pull-request@v7
              id: cpr
              if: env.APPLY_FIXES_IF_PR == 'true'
              with:
                commit-message: "[MegaLinter] Apply linters automatic fixes"
                title: "[MegaLinter] Apply linters automatic fixes"
                labels: bot

            - name: Create PR output
              if: env.APPLY_FIXES_IF_PR == 'true'
              run: |
                echo "PR Number - ${{ steps.cpr.outputs.pull-request-number }}"
                echo "PR URL - ${{ steps.cpr.outputs.pull-request-url }}"

