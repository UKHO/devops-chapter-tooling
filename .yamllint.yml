extends: default
rules:
  document-start:
    present: false
  comments:
    min-spaces-from-content: 1
  line-length:
    max: 180
    level: warning
  indentation:
    spaces: consistent
    indent-sequences: true
    check-multi-line-strings: false
    level: warning
  truthy:
    allowed-values: ['true', 'false']
    check-keys: true
    level: warning
